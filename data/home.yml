experiences:
  - icon: 🕌
    title: 800-year-old heritage
    text: >
      The Magaamfulhu — a coral-stone house marking where Islam's first teacher
      prayed in 1153 — still stands, beside one of Baa Atoll's oldest
      coral-stone mosques.
    link_label: Read the story →
    link_url: history.html
  - icon: 🌿
    title: Dhivehi Beys healers
    text: >
      Kendhoo is known nationwide for traditional herbal medicine — people
      travel from other islands, and even other countries, for treatment here.
    link_label: Explore the tradition →
    link_url: culture.html
  - icon: 🐬
    title: Hanifaru Bay nearby
    text: >
      A short boat ride to the world's largest known manta ray feeding
      aggregation — plus the quiet sandbanks of the Fasdūtherē chain.
    link_label: See things to do →
    link_url: explore.html
split_sections:
  - eyebrow: 📜 The naming legend
    title: The island that named itself "sweet"
    text: >
      Maldivian tradition holds that an Arab scholar — remembered here as
      Thabreyzgefaanu — who is widely credited with introducing Islam to the
      Maldives in 1153, stopped on this island and asked for a young coconut to
      drink. He found it so sweet that he renamed the island Fani Kendhoo,
      "sweet Kendhoo." The spot where he prayed was later marked by a
      coral-stone house, the Magaamfulhu, which still stands today.
    image: /assets/img/kendhoo-harbour.jpg
    float_tag_emoji: 🥥
    float_tag_text: Fani Kendhoo · "sweet Kendhoo"
    button_label: Read the Magaamfulhu story →
    button_url: history.html
    reverse: false
  - eyebrow: 🎉 A working island
    title: Festivals, fishing & Friday prayers
    text: >
      Daily life here still runs on tide, prayer time and harvest. Eid is marked
      with Boduberu drumming and shared feasts, children's days fill the
      schoolyard, and the harbour empties and fills again with the fishing
      fleet. Visiting Kendhoo means stepping into a Maldivian island as
      residents actually live it — modest dress on the village streets, warm
      hospitality, and a pace set by the sea.
    image: /assets/img/kendhoo-childrens-day.jpg
    float_tag_emoji: 🥁
    float_tag_text: Boduberu nights
    button_label: Culture & traditions →
    button_url: culture.html
    reverse: true
