hero:
  eyebrow: 🏝️ Baa Atoll · UNESCO Biosphere Reserve
  title: Say hello to Kendhoo
  dhivehi_title: ކެންދޫ · Maldives
  lede: >
    A small fishing island with a very big story — said to be where Islam first
    took root in the Maldives, home to a centuries-old healing tradition, and a
    short boat ride from the manta rays of Hanifaru Bay.
  image: /assets/img/41e19c33f11f8fd7a131d9665f2e296b622a161a-1.jpeg
welcome:
  eyebrow: 👋 Welcome
  title: An island that still remembers
  text: >
    Most visitors to the Maldives never set foot on an inhabited island. Kendhoo
    is one of thirteen lived-in islands in Baa Atoll — a working community of
    around a thousand people, where the harbour fills with dhonis at dusk,
    thatch is still woven by hand, and elders still point to the very spot
    where, local tradition holds, Islamic prayer was first offered in the
    Maldives. It doesn't perform its history for tourists. It simply still has
    one, in daily use.
